<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 520" fill="none">
  <defs>
    <linearGradient id="glow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#80c8e0" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#0e1018" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- background -->
  <rect width="840" height="520" rx="12" fill="#0e1018"/>
  <rect width="840" height="520" rx="12" fill="url(#glow)"/>

  <!-- watermark kanji -->
  <text x="700" y="420" font-family="serif" font-size="300" fill="#0e1018" fill-opacity="0.3" text-anchor="middle">空</text>

  <!-- title bar dots -->
  <circle cx="32" cy="24" r="6" fill="#c46c78" opacity="0.8"/>
  <circle cx="52" cy="24" r="6" fill="#d4b878" opacity="0.8"/>
  <circle cx="72" cy="24" r="6" fill="#90c8a0" opacity="0.8"/>

  <!-- title -->
  <text x="420" y="28" text-anchor="middle" font-family="'SF Mono','JetBrains Mono','Fira Code',monospace" font-size="12" fill="#586478">sora</text>

  <!-- separator -->
  <line x1="0" y1="44" x2="840" y2="44" stroke="#222838" stroke-width="1"/>

  <!-- line numbers -->
  <g font-family="'SF Mono','JetBrains Mono','Fira Code',monospace" font-size="13" fill="#364050">
    <text x="28" y="76" text-anchor="end">5</text>
    <text x="28" y="96" text-anchor="end">6</text>
    <text x="28" y="116" text-anchor="end">7</text>
    <text x="28" y="136" text-anchor="end">8</text>
    <text x="28" y="156" text-anchor="end">9</text>
    <text x="28" y="176" text-anchor="end">10</text>
    <text x="28" y="196" text-anchor="end">11</text>
    <text x="28" y="216" text-anchor="end">12</text>
    <text x="28" y="236" text-anchor="end">13</text>
    <text x="28" y="256" text-anchor="end">14</text>
    <text x="28" y="276" text-anchor="end">15</text>
    <text x="28" y="296" text-anchor="end">16</text>
    <text x="28" y="316" text-anchor="end">17</text>
    <text x="28" y="336" text-anchor="end">18</text>
    <text x="28" y="356" text-anchor="end">19</text>
    <text x="28" y="376" text-anchor="end">20</text>
    <text x="28" y="396" text-anchor="end">21</text>
    <text x="28" y="416" text-anchor="end">22</text>
    <text x="28" y="436" text-anchor="end">23</text>
    <text x="28" y="456" text-anchor="end">24</text>
    <text x="28" y="476" text-anchor="end">25</text>
    <text x="28" y="496" text-anchor="end">26</text>
  </g>

  <!-- code -->
  <g font-family="'SF Mono','JetBrains Mono','Fira Code',monospace" font-size="13" xml:space="preserve">
    <text x="48" y="76"><tspan fill="#b0a0d8" font-style="italic">type</tspan><tspan fill="#d0a888"> Client </tspan><tspan fill="#b0a0d8" font-style="italic">struct</tspan><tspan fill="#9aa4b8"> {</tspan></text>
    <text x="48" y="96"><tspan fill="#c8d0e0">    ID     </tspan><tspan fill="#d0a888" font-style="italic">string</tspan><tspan fill="#c8d0e0">  </tspan><tspan fill="#90c8a0">`json:"id"`</tspan></text>
    <text x="48" y="116"><tspan fill="#c8d0e0">    Score  </tspan><tspan fill="#d0a888" font-style="italic">float64</tspan><tspan fill="#c8d0e0"> </tspan><tspan fill="#90c8a0">`json:"score"`</tspan></text>
    <text x="48" y="136"><tspan fill="#c8d0e0">    Active </tspan><tspan fill="#d0a888" font-style="italic">bool</tspan><tspan fill="#c8d0e0">    </tspan><tspan fill="#90c8a0">`json:"active"`</tspan></text>
    <text x="48" y="156"><tspan fill="#9aa4b8">}</tspan></text>
    <text x="48" y="196"><tspan fill="#b0a0d8" font-style="italic">const</tspan><tspan fill="#d4b878"> MaxRetries</tspan><tspan fill="#8898b8"> = </tspan><tspan fill="#d4b878">5</tspan></text>
    <text x="48" y="236"><tspan fill="#586478" font-style="italic">// Register adds a client and computes its score.</tspan></text>
    <text x="48" y="256"><tspan fill="#b0a0d8" font-style="italic">func</tspan><tspan fill="#80c8e0"> Register</tspan><tspan fill="#9aa4b8">(</tspan><tspan fill="#d0a888">id </tspan><tspan fill="#d0a888" font-style="italic">string</tspan><tspan fill="#9aa4b8">, </tspan><tspan fill="#d0a888">values </tspan><tspan fill="#9aa4b8">[]</tspan><tspan fill="#d0a888" font-style="italic">float64</tspan><tspan fill="#9aa4b8">) (</tspan><tspan fill="#8898b8">*</tspan><tspan fill="#d0a888">Client</tspan><tspan fill="#9aa4b8">, </tspan><tspan fill="#d0a888" font-style="italic">error</tspan><tspan fill="#9aa4b8">) {</tspan></text>
    <text x="48" y="276"><tspan fill="#c8d0e0">    </tspan><tspan fill="#b0a0d8" font-style="italic">if</tspan><tspan fill="#c8d0e0"> id </tspan><tspan fill="#8898b8">== </tspan><tspan fill="#90c8a0">""</tspan><tspan fill="#9aa4b8"> {</tspan></text>
    <text x="48" y="296"><tspan fill="#c8d0e0">        </tspan><tspan fill="#b0a0d8" font-style="italic">return</tspan><tspan fill="#d0909c" font-style="italic"> nil</tspan><tspan fill="#9aa4b8">, </tspan><tspan fill="#c8d0e0">fmt</tspan><tspan fill="#9aa4b8">.</tspan><tspan fill="#80c8e0">Errorf</tspan><tspan fill="#9aa4b8">(</tspan><tspan fill="#90c8a0">"client </tspan><tspan fill="#78b8b0">%q</tspan><tspan fill="#90c8a0"> invalid"</tspan><tspan fill="#9aa4b8">, </tspan><tspan fill="#c8d0e0">id</tspan><tspan fill="#9aa4b8">)</tspan></text>
    <text x="48" y="316"><tspan fill="#c8d0e0">    </tspan><tspan fill="#9aa4b8">}</tspan></text>
    <text x="48" y="336"><tspan fill="#c8d0e0">    score </tspan><tspan fill="#8898b8">:= </tspan><tspan fill="#d4b878">0.0</tspan></text>
    <text x="48" y="356"><tspan fill="#c8d0e0">    </tspan><tspan fill="#b0a0d8" font-style="italic">for</tspan><tspan fill="#c8d0e0"> i</tspan><tspan fill="#9aa4b8">, </tspan><tspan fill="#c8d0e0">v </tspan><tspan fill="#8898b8">:= </tspan><tspan fill="#b0a0d8" font-style="italic">range</tspan><tspan fill="#c8d0e0"> values</tspan><tspan fill="#9aa4b8"> {</tspan></text>
    <text x="48" y="376"><tspan fill="#c8d0e0">        score </tspan><tspan fill="#8898b8">+= </tspan><tspan fill="#c8d0e0">v </tspan><tspan fill="#8898b8">* </tspan><tspan fill="#c8d0e0">math</tspan><tspan fill="#9aa4b8">.</tspan><tspan fill="#80c8e0">Exp</tspan><tspan fill="#9aa4b8">(</tspan><tspan fill="#8898b8">-</tspan><tspan fill="#d4b878">0.15</tspan><tspan fill="#8898b8">*</tspan><tspan fill="#80c8e0" font-style="italic">float64</tspan><tspan fill="#9aa4b8">(</tspan><tspan fill="#c8d0e0">i</tspan><tspan fill="#9aa4b8">))</tspan></text>
    <text x="48" y="396"><tspan fill="#c8d0e0">    </tspan><tspan fill="#9aa4b8">}</tspan></text>
    <text x="48" y="436"><tspan fill="#c8d0e0">    client </tspan><tspan fill="#8898b8">:= &amp;</tspan><tspan fill="#d0a888">Client</tspan><tspan fill="#9aa4b8">{</tspan></text>
    <text x="48" y="456"><tspan fill="#c8d0e0">        </tspan><tspan fill="#8898b8">ID</tspan><tspan fill="#9aa4b8">:     </tspan><tspan fill="#c8d0e0">id</tspan><tspan fill="#9aa4b8">,</tspan></text>
    <text x="48" y="476"><tspan fill="#c8d0e0">        </tspan><tspan fill="#8898b8">Score</tspan><tspan fill="#9aa4b8">:  </tspan><tspan fill="#c8d0e0">math</tspan><tspan fill="#9aa4b8">.</tspan><tspan fill="#80c8e0">Round</tspan><tspan fill="#9aa4b8">(</tspan><tspan fill="#c8d0e0">score</tspan><tspan fill="#8898b8">*</tspan><tspan fill="#d4b878">100</tspan><tspan fill="#9aa4b8">) </tspan><tspan fill="#8898b8">/ </tspan><tspan fill="#d4b878">100</tspan><tspan fill="#9aa4b8">,</tspan></text>
    <text x="48" y="496"><tspan fill="#c8d0e0">        </tspan><tspan fill="#8898b8">Active</tspan><tspan fill="#9aa4b8">: </tspan><tspan fill="#d0909c" font-style="italic">true</tspan><tspan fill="#9aa4b8">,</tspan></text>
  </g>

</svg>
