<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 130" fill="none">
  <rect width="720" height="130" rx="10" fill="#0e1018"/>

  <!-- kanji watermark behind title -->
  <text x="360" y="80" text-anchor="middle" font-family="serif" font-size="100" fill="#161a24">空</text>

  <!-- sora -->
  <text x="360" y="55" text-anchor="middle" font-family="'SF Mono','JetBrains Mono','Fira Code',monospace" font-size="48" font-weight="600" letter-spacing="18" fill="#c8d0e0">
    sora
  </text>

  <!-- tagline -->
  <text x="360" y="80" text-anchor="middle" font-family="'SF Mono','JetBrains Mono','Fira Code',monospace" font-size="11" letter-spacing="4" fill="#586478">
    a colorscheme for neovim
  </text>

  <!-- palette bar -->
  <g transform="translate(185, 100)">
    <rect x="0"   width="44" height="4" rx="2" fill="#80c8e0"/>
    <rect x="50"  width="44" height="4" rx="2" fill="#b0a0d8"/>
    <rect x="100" width="44" height="4" rx="2" fill="#90c8a0"/>
    <rect x="150" width="44" height="4" rx="2" fill="#d0a888"/>
    <rect x="200" width="44" height="4" rx="2" fill="#d4b878"/>
    <rect x="250" width="44" height="4" rx="2" fill="#d0909c"/>
    <rect x="300" width="44" height="4" rx="2" fill="#78b8b0"/>
  </g>
</svg>
