# Sora theme for tmux
# source-file ~/.config/tmux/sora.tmux.conf

# Status bar
set -g status-style "bg=default fg=#c8d0e0"
set -g status-position bottom
set -g status-justify left
set -g status-left-length 200

set -g status-left "#[fg=#80c8e0,bold] #{session_name}  "
set -g status-right "#[fg=#586478]#(cd #{pane_current_path}; git rev-parse --abbrev-ref HEAD) "

# Window status
set -g window-status-format "#[fg=#586478]#{window_index}:#{window_name}#{window_flags} "
set -g window-status-current-format "#[fg=#80c8e0,bold]#{window_index}:#{window_name}#{window_flags} "
set -g window-status-last-style "fg=#9aa4b8"
set -g window-status-activity-style "fg=#d4b878"

# Pane borders
set -g pane-border-style "fg=#222838"
set -g pane-active-border-style "fg=#80c8e0"

# Messages
set -g message-style "bg=#14161e fg=#c8d0e0"
set -g message-command-style "bg=#14161e fg=#c8d0e0"

# Selection / copy mode
set -g mode-style "bg=#1e2430 fg=#dce4f0"
